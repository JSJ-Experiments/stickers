name: Android release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-arm64:
    name: Build signed arm64 APK
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: ${{ runner.os }}-android-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: Create local config
        run: |
          cat > lib/src/api_keys.dart <<'EOF'
          const String fontsKey = "${{ secrets.GOOGLE_FONTS_API_KEY }}";
          EOF
          cat > android/key.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=stickers-release.jks
          EOF
          printf '%s' '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > android/app/stickers-release.jks

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed arm64 release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Verify APK signature
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          test -f "$APK"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stickers-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
